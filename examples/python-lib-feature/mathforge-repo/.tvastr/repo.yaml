# Optional hints — the agent discovers everything from repo docs by default.
# The 'validate' section is an optional outer safety net.
repo: mathforge

hints:
  language: python
  test_command: "python -m pytest tests/ -v"

# Optional: outer validation safety net (runs after the agent finishes each iteration)
validate:
  functional:
    - name: matrix-tests
      command: python -m pytest tests/test_matrix.py -v
      timeout: 60
  regression:
    - name: existing-vector-tests
      command: python -m pytest tests/test_vector.py -v
      timeout: 60
